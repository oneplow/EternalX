name: EternalX
version: 1.1.0
main: com.warakorn.eternalx.EternalX
api-version: 1.21
depend: [WorldEdit]

commands:
  eternalx:
    description: Main command for EternalX
    usage: /eternalx <reload|spawn|preview|confirm|cancel|debug|list>
    aliases: [etx, ex]
    permission: eternalx.use

permissions:
  eternalx.use:
    description: Basic permission to use EternalX commands
    default: true

  eternalx.admin:
    description: Access to admin commands (reload, debug, list)
    default: op
    children:
      eternalx.use: true
      eternalx.spawn: true
      eternalx.preview: true
      eternalx.debug: true

  eternalx.spawn:
    description: Spawn structures manually
    default: op
    children:
      eternalx.use: true

  eternalx.preview:
    description: Preview structures before spawning
    default: op
    children:
      eternalx.use: true

  eternalx.debug:
    description: Receive debug notifications when structures spawn
    default: op
    children:
      eternalx.use: true
